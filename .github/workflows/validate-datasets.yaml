name: Dataset Standards Validation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
    paths:
      - 'datasets/**'
      - '.github/scripts/**'
      - '.github/workflows/**'
      
  pull_request_target: 
    branches: [ "main" ]
    paths:
      - 'datasets/**'
      
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Checkout trusted scripts
        uses: actions/checkout@v6
        with:
          path: base-repo

      - name: Checkout untrusted PR datasets
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-repo

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Run validation & Comment (PR Check)
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x base-repo/.github/scripts/validate_datasets.py
          
          cd pr-repo
          OUTPUT=$(../base-repo/.github/scripts/validate_datasets.py --dir datasets --format json || true)
          cd ..
          
          export RESULTS="$OUTPUT"
          
          python base-repo/.github/scripts/sync_issues.py --mode pr

      - name: Run validation (Issue Sync)
        id: run_validation
        if: github.event_name != 'pull_request_target'
        run: |
          chmod +x base-repo/.github/scripts/validate_datasets.py
          
          cd base-repo
          OUTPUT=$(.github/scripts/validate_datasets.py --dir datasets --format json || true)
          cd ..
          
          echo "results=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Sync GitHub Issues
        if: github.event_name != 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RESULTS: ${{ steps.run_validation.outputs.results }}
        run: |
          python base-repo/.github/scripts/sync_issues.py --mode issues

      - name: Sync README.md Progress Table
        if: github.event_name != 'pull_request_target'
        env:
          RESULTS: ${{ steps.run_validation.outputs.results }}
        run: |
          # Step into base repo, which contains the .git history and README
          cd base-repo
          
          # Inject the table and timestamp into README.md
          python .github/scripts/sync_issues.py --mode readme
          
          # Configure git so GitHub Actions can push
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage README and conditionally commit if changes exist
          git add README.md
          if ! git diff-index --quiet HEAD; then
            git commit -m "docs: auto-update dataset progress table [skip ci]"
            git push
          else
            echo "No changes detected in README.md. Skipping commit."
          fi